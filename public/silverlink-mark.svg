<svg width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">SilverLink mark</title>
  <desc id="desc">Two interlinked rings, one silver and one teal.</desc>
  <circle cx="60" cy="80" r="48" fill="#c8c8d8"/>
  <circle cx="60" cy="80" r="29" fill="#fff"/>
  <circle cx="100" cy="80" r="48" fill="#0f766e"/>
  <circle cx="100" cy="80" r="29" fill="#fff"/>
  <clipPath id="teal-ring">
    <circle cx="100" cy="80" r="48"/>
  </clipPath>
  <circle cx="60" cy="80" r="48" fill="#b0b0c0" clip-path="url(#teal-ring)"/>
  <circle cx="60" cy="80" r="29" fill="#fff" clip-path="url(#teal-ring)"/>
  <circle cx="100" cy="80" r="29" fill="#fff"/>
  <rect x="48" y="64" width="24" height="32" rx="8" fill="#0f766e"/>
  <rect x="88" y="64" width="24" height="32" rx="8" fill="#c8c8d8"/>
  <circle cx="60" cy="80" r="48" fill="none" stroke="#e0e0ee" stroke-width="2"/>
  <circle cx="60" cy="80" r="29" fill="none" stroke="#e0e0ee" stroke-width="1.5"/>
  <circle cx="100" cy="80" r="48" fill="none" stroke="#0d5c56" stroke-width="2"/>
  <circle cx="100" cy="80" r="29" fill="none" stroke="#0d5c56" stroke-width="1.5"/>
</svg>
